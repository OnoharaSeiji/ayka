<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apostilas da Ayka</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
  :root {
    --cream: #FFFAF2;
    --paper: #FFF7EA;
    --ink:   #1E1810;
    --muted: #8C7B6B;
    --line:  #EAE0CE;
    --acc:   #FF9B3B;
    --acc2:  #FF6B6B;
    --today: #FF6B6B;
    --ready: #22C55E;
    --plan:  #A78BFA;
    --r: 14px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    /* subtle dot grid */
    background-image: radial-gradient(circle, #ddd0bb 1px, transparent 1px);
    background-size: 24px 24px;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #FF9B3B, #FF6B6B 50%, #C77DFF);
    padding: 1.4rem 2rem 1.8rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(-45deg, transparent, transparent 18px, rgba(255,255,255,.06) 18px, rgba(255,255,255,.06) 36px);
  }
  header h1 {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    font-weight: 800;
    color: #fff;
    text-shadow: 0 3px 12px rgba(0,0,0,.2);
    position: relative;
  }
  header p {
    color: rgba(255,255,255,.85);
    font-size: .9rem;
    font-weight: 700;
    margin-top: .3rem;
    position: relative;
  }

  /* ── CALENDAR WRAP ── */
  .cal-wrap {
    max-width: 860px;
    margin: 0 auto;
    padding: 1.5rem 1rem 3rem;
  }

  /* ── MONTH NAV ── */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
    border: 1.5px solid var(--line);
    border-radius: 20px;
    padding: .75rem 1rem;
    margin-bottom: 1rem;
    box-shadow: 0 4px 20px rgba(0,0,0,.07);
  }
  .month-nav h2 {
    font-family: 'Baloo 2', cursive;
    font-size: 1.3rem;
    font-weight: 800;
    text-transform: capitalize;
    color: var(--ink);
  }
  .month-nav p {
    font-size: .75rem;
    font-weight: 700;
    color: var(--muted);
    margin-top: .1rem;
  }
  .nav-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    background: var(--paper);
    font-size: 1.1rem;
    cursor: pointer;
    color: var(--ink);
    transition: all .2s;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .nav-btn:hover:not(:disabled) { background: var(--ink); color: #fff; border-color: var(--ink); }
  .nav-btn:disabled { opacity: .3; cursor: not-allowed; }

  /* ── LEGEND ── */
  .legend {
    display: flex;
    gap: .8rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 1rem;
  }
  .leg {
    display: flex;
    align-items: center;
    gap: .35rem;
    font-size: .72rem;
    font-weight: 800;
    color: var(--muted);
  }
  .leg-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
  }

  /* ── WEEKDAY HEADERS ── */
  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 4px;
  }
  .wd {
    text-align: center;
    font-size: .65rem;
    font-weight: 800;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .05em;
    padding: .3rem 0;
  }
  .wd.weekend { color: #C77DFF; }

  /* ── CALENDAR GRID ── */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  /* ── BASE CELL ── */
  .cell {
    border-radius: var(--r);
    min-height: 70px;
    padding: .4rem .45rem .5rem;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: .2rem;
  }

  /* empty cells */
  .cell.empty {
    background: transparent;
    min-height: 70px;
  }

  /* regular days (no apostila) */
  .cell.normal {
    background: #fff;
    border: 1.5px solid var(--line);
  }
  .cell.weekend-day {
    background: #FDF8FF;
    border: 1.5px solid #E8D8FF;
  }

  /* today highlight */
  .cell.is-today .day-num {
    background: var(--today);
    color: #fff;
    border-radius: 50%;
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: .75rem;
  }

  /* cells with a ready apostila */
  .cell.ready {
    background: #fff;
    border: 2px solid rgba(34,197,94,.3);
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: transform .18s, box-shadow .18s, border-color .18s;
    box-shadow: 0 2px 8px rgba(34,197,94,.1);
  }
  .cell.ready:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(34,197,94,.2);
    border-color: var(--ready);
  }

  /* cells with planned apostila */
  .cell.planned {
    background: #FDFBFF;
    border: 1.5px dashed rgba(167,139,250,.4);
  }

  /* day number */
  .day-num {
    font-family: 'Baloo 2', cursive;
    font-size: .8rem;
    font-weight: 800;
    color: var(--ink);
    line-height: 1;
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
  }
  .cell.normal .day-num,
  .cell.planned .day-num { color: var(--muted); }
  .cell.weekend-day .day-num { color: #C77DFF; }

  /* status dot */
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    position: absolute;
    top: .4rem; right: .45rem;
  }
  .cell.ready .status-dot { background: var(--ready); }
  .cell.planned .status-dot { background: var(--plan); opacity: .5; }

  /* apostila info inside cell */
  .cell-day {
    font-size: .6rem;
    font-weight: 800;
    color: var(--ready);
    text-transform: uppercase;
    letter-spacing: .04em;
    line-height: 1;
  }
  .cell-title {
    font-size: .62rem;
    font-weight: 700;
    color: #4A4038;
    line-height: 1.35;
    margin-top: .1rem;
  }
  .cell-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    margin-top: auto;
  }
  .cell-chip {
    font-size: .52rem;
    font-weight: 800;
    padding: .1rem .35rem;
    border-radius: 999px;
    background: rgba(34,197,94,.12);
    color: #15803D;
    line-height: 1.4;
  }
  .cell.planned .cell-chip {
    background: rgba(167,139,250,.12);
    color: #7C3AED;
  }
  .cell.planned .cell-day { color: var(--plan); }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    background: #fff;
    border: 1.5px solid var(--line);
    border-radius: 16px;
    padding: 1rem 1.2rem;
    margin-top: 1rem;
    box-shadow: 0 2px 12px rgba(0,0,0,.06);
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .progress-label {
    font-size: .8rem;
    font-weight: 800;
    color: var(--muted);
    white-space: nowrap;
  }
  .progress-bar-bg {
    flex: 1;
    min-width: 120px;
    height: 8px;
    background: var(--line);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, #FF9B3B, #22C55E);
    transition: width .6s cubic-bezier(.34,1.56,.64,1);
  }
  .progress-count {
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    font-weight: 800;
    color: var(--ink);
    white-space: nowrap;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 560px) {
    .cell { min-height: 54px; padding: .3rem; }
    .cell-title, .cell-chips { display: none; }
    .cell-day { font-size: .55rem; }
    .day-num { font-size: .72rem; }
    .month-nav h2 { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<header>
  <h1>📚 Apostilas da Ayka</h1>
  <p>2º Ano · 2026 · Clique no dia para abrir a apostila</p>
</header>

<div class="cal-wrap">

  <!-- LEGEND -->
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#22C55E"></div>Apostila pronta</div>
    <div class="leg"><div class="leg-dot" style="background:#A78BFA;opacity:.5"></div>Planejada</div>
    <div class="leg"><div class="leg-dot" style="background:#FF6B6B"></div>Hoje</div>
  </div>

  <!-- MONTH NAV -->
  <div class="month-nav">
    <button class="nav-btn" id="btnPrev" onclick="prevMonth()">←</button>
    <div style="text-align:center">
      <h2 id="monthTitle">Março 2026</h2>
      <p id="monthSub">0 apostilas prontas</p>
    </div>
    <button class="nav-btn" id="btnNext" onclick="nextMonth()">→</button>
  </div>

  <!-- WEEKDAYS -->
  <div class="weekdays">
    <div class="wd">Dom</div>
    <div class="wd">Seg</div>
    <div class="wd">Ter</div>
    <div class="wd">Qua</div>
    <div class="wd">Qui</div>
    <div class="wd">Sex</div>
    <div class="wd weekend">Sáb</div>
  </div>

  <!-- CALENDAR -->
  <div class="cal-grid" id="calGrid"></div>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <span class="progress-label">Progresso geral</span>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <span class="progress-count" id="progressCount">0 / 0</span>
  </div>

</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
// Reads from config.js → window.AYKA.dias
const DIAS = (window.AYKA && window.AYKA.dias) || [];

// Build a fast lookup: "YYYY-MM-DD" → dia object
const DIA_MAP = {};
DIAS.forEach(d => { DIA_MAP[d.data] = d; });

// Collect unique months from the data
function getMonthsFromData() {
  const seen = new Set();
  DIAS.forEach(d => seen.add(d.data.substring(0, 7)));
  return [...seen].sort();
}

const MONTHS = getMonthsFromData();
const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                   'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

// ── STATE ─────────────────────────────────────────────────────────────────────
const today = new Date();
const todayStr = today.toISOString().split('T')[0];

// Find the index of the current month (or the first month with data)
let curIdx = (() => {
  const curKey = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  const i = MONTHS.indexOf(curKey);
  return i >= 0 ? i : 0;
})();

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const key = MONTHS[curIdx];
  const [year, month] = key.split('-').map(Number);

  // Month title
  document.getElementById('monthTitle').textContent = `${MONTHS_PT[month-1]} ${year}`;

  // Count ready in this month
  const monthDias = DIAS.filter(d => d.data.startsWith(key));
  const readyCount = monthDias.filter(d => d.file).length;
  document.getElementById('monthSub').textContent =
    `${readyCount} apostila${readyCount !== 1 ? 's' : ''} pronta${readyCount !== 1 ? 's' : ''} neste mês · ${monthDias.length} dias planejados`;

  // Nav buttons
  document.getElementById('btnPrev').disabled = curIdx === 0;
  document.getElementById('btnNext').disabled = curIdx === MONTHS.length - 1;

  // Grid
  const firstDay = new Date(year, month - 1, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(year, month, 0).getDate();
  const grid = document.getElementById('calGrid');

  let html = '';

  // Leading blanks
  for (let i = 0; i < firstDay; i++) html += '<div class="cell empty"></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dia = DIA_MAP[dateStr];
    const isToday = dateStr === todayStr;
    const dow = new Date(year, month - 1, d).getDay(); // 0=Sun, 6=Sat
    const isWeekend = dow === 0 || dow === 6;

    if (dia) {
      // Has apostila data
      const hasFile = !!dia.file;
      const statusClass = hasFile ? 'ready' : 'planned';
      const chips = (dia.subjects || []).slice(0, 3)
        .map(s => `<span class="cell-chip">${s}</span>`).join('');

      const inner = `
        <div class="day-num${isToday ? ' today-num' : ''}">${d}</div>
        <div class="status-dot"></div>
        <div class="cell-day">Dia ${dia.numero}</div>
        <div class="cell-title">${dia.titulo}</div>
        <div class="cell-chips">${chips}</div>
      `;

      if (hasFile) {
        html += `<a href="${dia.file}" class="cell ${statusClass}${isToday ? ' is-today' : ''}">${inner}</a>`;
      } else {
        html += `<div class="cell ${statusClass}${isToday ? ' is-today' : ''}">${inner}</div>`;
      }
    } else {
      // No apostila this day
      const cls = isWeekend ? 'weekend-day' : 'normal';
      html += `<div class="cell ${cls}${isToday ? ' is-today' : ''}">
        <div class="day-num">${d}</div>
      </div>`;
    }
  }

  grid.innerHTML = html;

  // Apply today's circle manually (cleaner than inline style conflict)
  if (isToday) {
    document.querySelectorAll('.is-today .day-num').forEach(el => {
      el.style.background = '#FF6B6B';
      el.style.color = '#fff';
      el.style.borderRadius = '50%';
    });
  }

  // Progress
  const totalReady = DIAS.filter(d => d.file).length;
  const total = DIAS.length;
  const pct = total ? Math.round(totalReady / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = `${totalReady} / ${total} prontas`;
}

// Apply today circle after render
function applyToday() {
  document.querySelectorAll('.is-today .day-num').forEach(el => {
    el.style.background = '#FF6B6B';
    el.style.color = '#fff';
    el.style.borderRadius = '50%';
    el.style.width = '24px';
    el.style.height = '24px';
    el.style.display = 'flex';
    el.style.alignItems = 'center';
    el.style.justifyContent = 'center';
  });
}

function prevMonth() { if (curIdx > 0) { curIdx--; render(); applyToday(); } }
function nextMonth() { if (curIdx < MONTHS.length - 1) { curIdx++; render(); applyToday(); } }

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
applyToday();
</script>
</body>
</html>
